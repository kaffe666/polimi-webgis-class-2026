<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Results Carousel</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f4f0; font-family: 'Georgia', serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 0; }

.rp-wrap { width: 100%; max-width: 1100px; padding: 32px 0 24px; }

.rp-tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 28px; }
.rp-tab {
  padding: 6px 26px; border-radius: 20px;
  border: 1px solid #ccc; background: transparent;
  color: #888; font-size: 14px; cursor: pointer;
  font-family: inherit; transition: all 0.18s;
}
.rp-tab.active { background: #fff; border-color: #555; color: #111; font-weight: 500; }

.rp-stage {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  padding: 0 64px;
}

.rp-card {
  width: 100%;
  border-radius: 20px;
  background: #fff;
  border: 1px solid #e0e0e0;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.10);
  display: flex;
  flex-direction: column;
}

.card-img-area {
  width: 100%;
  height: 420px;
  background: #f0ede8;
  border-bottom: 1px solid #e8e8e8;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.card-img-area img { width: 100%; height: 100%; object-fit: cover; }

.card-body-area {
  padding: 22px 28px 24px;
}
.card-fig-label {
  font-size: 11px; color: #aaa; margin: 0 0 5px;
  text-transform: uppercase; letter-spacing: 0.08em;
}
.card-fig-title { font-size: 20px; font-weight: 500; color: #111; margin: 0 0 10px; }
.card-fig-desc { font-size: 14px; color: #666; margin: 0; line-height: 1.65; }

.nav-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 44px; height: 44px; border-radius: 50%;
  background: #fff; border: 1px solid #ddd; color: #333;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 20; font-size: 26px;
  user-select: none; transition: background 0.15s; flex-shrink: 0;
}
.nav-btn:hover { background: #f5f4f0; }
.lbtn { left: 8px; }
.rbtn { right: 8px; }

.rp-dots { display: flex; justify-content: center; gap: 6px; margin-top: 18px; }
.rp-dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; transition: all 0.2s; cursor: pointer; }
.rp-dot.active { width: 22px; border-radius: 3px; background: #555; }
</style>
</head>
<body>
<div class="rp-wrap">
  <div class="rp-tabs">
    <div class="rp-tab active" data-tab="no2">NO₂</div>
    <div class="rp-tab" data-tab="pm25">PM₂.₅</div>
    <div class="rp-tab" data-tab="pm10">PM₁₀</div>
  </div>

  <div class="rp-stage">
    <div class="nav-btn lbtn" id="btnL" aria-label="Previous">&#8249;</div>
    <div class="rp-card" id="card"></div>
    <div class="nav-btn rbtn" id="btnR" aria-label="Next">&#8250;</div>
  </div>

  <div class="rp-dots" id="dots"></div>
</div>

<script>
var data = {
  no2:[
    {fig:"Figure 1", title:"CAMS December 2023", desc:"Monthly NO₂ concentration raster clipped to Greece. Peak values visible near Athens and Thessaloniki.", img:""},
    {fig:"Figure 2", title:"Annual Average 2023", desc:"Yearly average NO₂ showing persistent high-concentration corridors along major transport routes.", img:""},
    {fig:"Figure 3", title:"Concentration Classes 2023", desc:"Reclassified NO₂ map into discrete exposure categories following WHO guideline thresholds.", img:""},
    {fig:"Figure 4", title:"AMAC 2021–2023", desc:"Annual mean absolute change showing temporal trend of NO₂ between 2021 and 2023.", img:""},
    {fig:"Figure 5", title:"Population Bivariate 2023", desc:"Bivariate map combining NO₂ concentration classes with population density for exposure assessment.", img:""}
  ],
  pm25:[
    {fig:"Figure 1", title:"CAMS December 2023", desc:"PM₂.₅ concentration raster for December 2023, highlighting winter pollution peaks in urban basins.", img:""},
    {fig:"Figure 2", title:"Annual Average 2023", desc:"Annual mean PM₂.₅ showing the Athens basin as a persistent high-concentration zone.", img:""},
    {fig:"Figure 3", title:"Concentration Classes 2023", desc:"PM₂.₅ reclassified into WHO-aligned exposure categories across Greek administrative units.", img:""},
    {fig:"Figure 4", title:"AMAC 2021–2023", desc:"Change in annual mean PM₂.₅ between 2021 and 2023, revealing improving and worsening areas.", img:""},
    {fig:"Figure 5", title:"Population Bivariate 2023", desc:"Combined PM₂.₅ and population density map identifying high-risk exposure zones.", img:""}
  ],
  pm10:[
    {fig:"Figure 1", title:"CAMS December 2023", desc:"PM₁₀ concentration raster for December 2023. Northern lowlands show elevated coarse particle levels.", img:""},
    {fig:"Figure 2", title:"Annual Average 2023", desc:"Annual mean PM₁₀ for 2023, with highest values in northern Greece and construction-active zones.", img:""},
    {fig:"Figure 3", title:"Concentration Classes 2023", desc:"Reclassified PM₁₀ concentration map into discrete risk categories for spatial comparison.", img:""},
    {fig:"Figure 4", title:"AMAC 2021–2023", desc:"Temporal change in PM₁₀ annual mean from 2021 to 2023 across Greek administrative regions.", img:""},
    {fig:"Figure 5", title:"Population Bivariate 2023", desc:"Bivariate exposure map combining PM₁₀ classes with population distribution data.", img:""}
  ]
};

var tab='no2', idx=0;

function makePlaceholderSVG(item){
  return '<svg width="100%" height="100%" viewBox="0 0 960 420" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">'
    +'<rect width="960" height="420" fill="#f0ede8"/>'
    +'<rect x="90"  y="230" width="80" height="160" rx="4" fill="#d5d0c8"/>'
    +'<rect x="200" y="175" width="80" height="215" rx="4" fill="#d5d0c8"/>'
    +'<rect x="310" y="105" width="80" height="285" rx="4" fill="#c8c3bb"/>'
    +'<rect x="420" y="190" width="80" height="200" rx="4" fill="#d5d0c8"/>'
    +'<rect x="530" y="210" width="80" height="180" rx="4" fill="#d5d0c8"/>'
    +'<rect x="640" y="245" width="80" height="145" rx="4" fill="#d5d0c8"/>'
    +'<rect x="750" y="260" width="80" height="130" rx="4" fill="#dedad4"/>'
    +'<text x="480" y="68" fill="#b0ab9f" font-size="22" text-anchor="middle" font-family="Georgia,serif">'+item.fig+' · '+item.title+'</text>'
    +'</svg>';
}

function render(){
  var items = data[tab], n = items.length, item = items[idx];
  var card = document.getElementById('card');
  var imgContent = item.img
    ? '<img src="'+item.img+'" alt="'+item.title+'" />'
    : makePlaceholderSVG(item);
  card.innerHTML =
    '<div class="card-img-area">'+imgContent+'</div>'
    +'<div class="card-body-area">'
    +'<p class="card-fig-label">'+item.fig+'</p>'
    +'<p class="card-fig-title">'+item.title+'</p>'
    +'<p class="card-fig-desc">'+item.desc+'</p>'
    +'</div>';

  var dots = document.getElementById('dots');
  dots.innerHTML = '';
  for(var i=0; i<n; i++){
    var d = document.createElement('div');
    d.className = 'rp-dot' + (i===idx ? ' active' : '');
    (function(ii){ d.addEventListener('click', function(){ idx=ii; render(); }); })(i);
    dots.appendChild(d);
  }
}

function go(dir){ idx = (idx + dir + data[tab].length) % data[tab].length; render(); }
document.getElementById('btnL').addEventListener('click', function(){ go(-1); });
document.getElementById('btnR').addEventListener('click', function(){ go(1); });
document.querySelectorAll('.rp-tab').forEach(function(t){
  t.addEventListener('click', function(){
    tab = t.getAttribute('data-tab'); idx = 0;
    document.querySelectorAll('.rp-tab').forEach(function(x){ x.classList.remove('active'); });
    t.classList.add('active'); render();
  });
});
render();
</script>
</body>
</html>
