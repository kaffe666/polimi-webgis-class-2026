<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greece Air Quality | WebGIS</title>

  <!-- OpenLayers v7 stylesheet -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@7.5.2/ol.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="site-header">
    <nav class="navbar">
      <a class="logo" href="index.html">AIR QUALITY IN GREECE · GROUP 05</a>
      <div class="nav-links">
        <a href="index.html">home</a>
        <a href="results.html">results</a>
        <a href="webgis.html" class="active">webgis</a>
        <a href="https://github.com/sumumu-0107/webgis_group05" class="github-link" target="_blank" rel="noopener">GitHub</a>
      </div>
    </nav>
  </header>

  <div class="app">
    <!-- SIDEBAR: base map chooser, layer switcher, legend -->
    <aside class="sidebar">
      <section class="panel">
        <h2>Base Map</h2>
        <label class="row">
          <input type="radio" name="basemap" value="osm" checked />
          OpenStreetMap
        </label>
        <label class="row">
          <input type="radio" name="basemap" value="sat" />
          Esri Satellite
        </label>
      </section>

      <section class="panel">
        <h2>Layers</h2>
        <!-- Flat list with group headers, injected by app.js -->
        <div id="layer-switcher"></div>
      </section>

      <section class="panel">
        <h2>Legend</h2>
        <div id="legend">
          <p class="hint">Enable a layer to see its legend.</p>
        </div>
      </section>
    </aside>

    <!-- MAP -->
    <main class="map-wrap">
      <div id="map" class="map"></div>
      <div id="mouse-position" class="mouse-position"></div>
    </main>
  </div>

  <!-- OpenLayers v7 library -->
  <script src="https://cdn.jsdelivr.net/npm/ol@7.5.2/dist/ol.js"></script>
  <script src="app.js"></script>
</body>
</html>
