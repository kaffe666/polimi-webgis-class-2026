<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greece Air Quality | WebGIS</title>

  <!-- OpenLayers v7 stylesheet -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@7.5.2/ol.css" />
  <link rel="stylesheet" href="style.css?v=10" />
</head>

<body>
  <header class="site-header">
    <nav class="navbar">
      <a class="logo" href="index.html">AIR QUALITY IN GREECE · GROUP 05</a>
      <div class="nav-links">
        <a href="index.html">home</a>
        <a href="workflow.html">workflow</a>
        <a href="results.html">results</a>
        <a href="webgis.html" class="active">webgis</a>
        <a href="https://github.com/sumumu-0107/webgis_group05" class="github-link" target="_blank" rel="noopener">GitHub</a>
      </div>
    </nav>
  </header>

  <div class="map-wrap">
    <div id="map" class="map"></div>
    <div id="mouse-position" class="mouse-position"></div>

    <!-- Floating legend – bottom-left, overlays the map -->
    <div id="legend" class="legend-float">
      <div class="legend-float-title" id="legend-drag-handle">
        <span class="drag-dots">⠿</span> Legend
      </div>
      <div id="legend-inner" class="legend-float-inner"></div>
    </div>

    <!-- Floating layer panel – right side -->
    <div class="layer-panel" id="layer-panel">
      <div class="panel-drag-handle" id="layer-panel-handle">
        <span class="drag-dots">⠿</span> Layers
      </div>

      <section class="lp-section">
        <div class="lp-section-title">Base Map</div>
        <label class="lp-row">
          <input type="radio" name="basemap" value="osm" checked />
          OpenStreetMap
        </label>
        <label class="lp-row">
          <input type="radio" name="basemap" value="sat" />
          ESRI Satellite
        </label>
      </section>

      <section class="lp-section">
        <div class="lp-section-title">Sort</div>
        <label class="lp-row">
          <input type="radio" name="lp-sort" value="pollutant" checked />
          By pollutant
        </label>
        <label class="lp-row">
          <input type="radio" name="lp-sort" value="category" />
          By category
        </label>
      </section>

      <div id="layer-switcher"></div>
    </div>
  </div>

  <!-- OpenLayers v7 library -->
  <script src="https://cdn.jsdelivr.net/npm/ol@7.5.2/dist/ol.js"></script>
  <script src="app.js"></script>
</body>
</html>
